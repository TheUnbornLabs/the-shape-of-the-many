<script>window.__ASSESS__={"title":"Book Three","questions":[{"prompt":"In the simulator, adding a few random ‘shortcut’ edges to a ring lattice:","options":["Barely changes distances","Dramatically shortens average path length","Disconnects the graph"],"answer":1,"explanation":"Even a small rewiring probability produces the small-world effect.","cat":"Networks & contagion"},{"prompt":"Weak ties are the ones most likely to be:","options":["Within a cluster","Bridges between clusters","Isolated"],"answer":1,"explanation":"Bridging position, not intimacy, is what makes a tie informationally powerful.","cat":"Networks & contagion"},{"prompt":"Scale-free networks are generated by preferential attachment, meaning new nodes:","options":["Connect at random","Connect preferentially to already-popular nodes","Avoid hubs"],"answer":1,"explanation":"‘The rich get richer’ produces a few very-high-degree hubs (Barabási–Albert).","cat":"Networks & contagion"},{"prompt":"Homophily can be hard to distinguish from social influence because both produce:","options":["Random ties","Clusters of similar, connected people","Isolated nodes"],"answer":1,"explanation":"Do friends become similar, or do similar people befriend? Both yield the same clustering.","cat":"Networks & contagion"},{"prompt":"If a structural hole closes (the two groups connect directly), the broker’s advantage:","options":["Grows","Erodes","Is unchanged"],"answer":1,"explanation":"Once the groups link directly, the broker no longer controls the flow.","cat":"Networks & contagion"},{"prompt":"A filter bubble arises when algorithms:","options":["Show diverse views","Select content matching prior behaviour, narrowing exposure","Randomise content"],"answer":1,"explanation":"Optimising for engagement can feed back preferences into ever-narrower exposure.","cat":"Networks & contagion"},{"prompt":"The ‘chasm’ in diffusion is the gap between:","options":["Innovators and early adopters","Early adopters and the early majority","Majority and laggards"],"answer":1,"explanation":"Crossing from visionaries to pragmatists is where many innovations stall (Moore).","cat":"Networks & contagion"},{"prompt":"In the simulator, lowering transmission or raising recovery pushes R:","options":["Up","Down toward and below 1","Unchanged"],"answer":1,"explanation":"Both reduce onward spread — the logic behind interventions.","cat":"Networks & contagion"},{"prompt":"Complex contagion differs from simple contagion by requiring:","options":["One exposure","Multiple reinforcing exposures to adopt","No exposure"],"answer":1,"explanation":"Risky or costly behaviours need social confirmation from several contacts (Centola & Macy).","cat":"Networks & contagion"},{"prompt":"A catchy falsehood can outcompete a dull truth because selection favours:","options":["Accuracy","Stickiness and ease of transmission","Complexity"],"answer":1,"explanation":"Transmissibility, not veracity, is the fitness criterion — a warning for the information age.","cat":"Networks & contagion"},{"prompt":"Seeding the same content in a denser, better-connected cluster tends to:","options":["Lower spread","Raise the chance of crossing the viral threshold","Have no effect"],"answer":1,"explanation":"Structure and seeding position materially change ignition probability.","cat":"Networks & contagion"},{"prompt":"The first follower matters because they:","options":["Replace the leader","Legitimise the idea and lower others’ risk of joining","End the movement"],"answer":1,"explanation":"The first follower shows the leader how to follow and makes the movement joinable.","cat":"Networks & contagion"}],"next":{"href":"book-4.html","label":"On to Book Four"}}</script>
