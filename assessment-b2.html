<script>window.__ASSESS__={"title":"Book Two","questions":[{"prompt":"A cascade can lock a whole crowd onto a wrong choice because early public actions:","options":["Reveal all private information","Hide the private signals that follow","Are always correct"],"answer":1,"explanation":"Once people copy rather than reveal, later private signals never enter the public pool — the crowd stops learning.","cat":"Cascades & panics"},{"prompt":"The best antidote to an availability cascade is usually:","options":["More vivid anecdotes","Base rates and statistical context","Louder repetition"],"answer":1,"explanation":"Grounding perception in frequencies counteracts the salience distortion.","cat":"Cascades & panics"},{"prompt":"Fatal crowd crushes are best understood as:","options":["Mass irrationality","Density-driven physical dynamics beyond individual control","Deliberate stampedes"],"answer":1,"explanation":"Once density crosses a threshold, propagating forces move people involuntarily — a fluid-like failure.","cat":"Cascades & panics"},{"prompt":"Manias collapse when:","options":["The last greater fool has bought","Prices are fair","Regulators approve"],"answer":0,"explanation":"When the flow of new buyers dries up, the greater-fool chain breaks and prices crash.","cat":"Cascades & panics"},{"prompt":"Adding identifiability (name badges, cameras) tends to:","options":["Increase extreme behaviour","Restore personal accountability and restraint","Do nothing"],"answer":1,"explanation":"Re-individuating people reinstates the accountability anonymity had removed.","cat":"Cascades & panics"},{"prompt":"Emotional contagion spreads largely through:","options":["Reasoned argument","Automatic mimicry of expressions and tone","Written contracts"],"answer":1,"explanation":"We unconsciously copy others’ facial and vocal cues, then feel the matching emotion.","cat":"Cascades & panics"},{"prompt":"Adding one dissenting ally to the group:","options":["Increases conformity","Sharply reduces conformity","Has no effect"],"answer":1,"explanation":"A single non-conforming partner breaks the unanimity that drives the pressure.","cat":"Conformity & obedience"},{"prompt":"A norm seeded in an ambiguous group can:","options":["Vanish at once","Persist across generations of members","Never transmit"],"answer":1,"explanation":"Replacement studies show arbitrary norms passing to newcomers long after the originators leave.","cat":"Conformity & obedience"},{"prompt":"Cialdini’s ‘social proof’ principle says we look to others’ behaviour especially when:","options":["We are certain","We are uncertain or the situation is ambiguous","We are alone forever"],"answer":1,"explanation":"Uncertainty makes the crowd’s behaviour a shortcut for the ‘correct’ action.","cat":"Conformity & obedience"},{"prompt":"Social proof can manufacture outcomes when displayed counts are:","options":["Accurate","Faked or gamed (bots, fake reviews)","Hidden"],"answer":1,"explanation":"Fabricated popularity hijacks the heuristic — a bridge to Book Five’s astroturfing.","cat":"Conformity & obedience"},{"prompt":"Anonymity should reduce which influence most?","options":["Informational","Normative","Both equally to zero"],"answer":1,"explanation":"Remove the audience and the need for approval (normative) falls; informational influence can persist.","cat":"Conformity & obedience"},{"prompt":"Pluralistic ignorance is a mismatch between:","options":["Two different groups","Private belief and the belief each person attributes to others","Facts and fiction"],"answer":1,"explanation":"A shared private view coexists with the false belief that ‘everyone else thinks otherwise’.","cat":"Conformity & obedience"}],"next":{"href":"book-3.html","label":"On to Book Three"}}</script>
