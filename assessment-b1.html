<script>window.__ASSESS__={"title":"Book One","questions":[{"prompt":"A single ant is nearly witless, yet the colony farms, wages war, and repairs itself. The colony’s intelligence is best described as:","options":["Stored in the queen’s brain","An emergent property of many local interactions","An illusion of human observers"],"answer":1,"explanation":"No ant holds the plan; the capacity appears at the level of the many, from local interaction plus nonlinearity.","cat":"Emergence"},{"prompt":"Raise separation far above cohesion in the simulator. The flock will most likely:","options":["Bind into a tight ball","Scatter and stop cohering","Freeze in place"],"answer":1,"explanation":"Cohesion pulls together; separation pushes apart. Tip the balance and the flock disperses.","cat":"Emergence"},{"prompt":"Negative feedback tends to:","options":["Amplify deviations","Damp deviations toward a set point","Do nothing"],"answer":1,"explanation":"A thermostat is negative feedback: it counteracts change and stabilises. Positive feedback compounds change.","cat":"Emergence"},{"prompt":"Two crowds have identical average attitudes but different threshold distributions. They can:","options":["Only ever behave identically","Produce wildly different outcomes — one calm, one rioting","Never riot"],"answer":1,"explanation":"One missing ‘threshold-1’ instigator can be the difference between nothing and a full cascade.","cat":"Emergence"},{"prompt":"The selfish herd warns us that visible cooperation-looking behaviour:","options":["Always implies altruism","May be explained by individual self-interest","Is impossible"],"answer":1,"explanation":"Apparent togetherness is not proof of altruism — a recurring caution in the book.","cat":"Evolutionary grouping"},{"prompt":"The predator confusion effect works by:","options":["Making prey faster","Impairing target selection among many similar moving prey","Poisoning the predator"],"answer":1,"explanation":"Sensory and attentional limits make it hard to track one target in a shifting many.","cat":"Evolutionary grouping"},{"prompt":"Optimal group size is set where:","options":["Groups are as large as possible","Marginal benefit of joining equals marginal cost","Groups are as small as possible"],"answer":1,"explanation":"Animals should join until the next member’s cost outweighs its benefit — a marginal balance.","cat":"Evolutionary grouping"},{"prompt":"As relatedness r falls toward zero, kin-selected altruism should:","options":["Increase","Become harder to sustain","Stay constant"],"answer":1,"explanation":"With low r, the rb term shrinks and altruism no longer clears Hamilton’s threshold.","cat":"Evolutionary grouping"},{"prompt":"Crowd estimates beat most individuals because independent errors:","options":["Add up","Tend to cancel when averaged","Never occur"],"answer":1,"explanation":"Over- and under-estimates offset, leaving the shared signal — provided guesses are independent.","cat":"Crowd intelligence"},{"prompt":"A team of near-identical experts will, by this theorem, have:","options":["Low diversity, so little crowd bonus","Maximum diversity","Zero average error"],"answer":0,"explanation":"Similarity means small diversity term, so the crowd barely beats the average member.","cat":"Crowd intelligence"},{"prompt":"Doubling the number of independent estimates reduces the noise’s standard error by roughly:","options":["A factor of 2","A factor of √2","Not at all"],"answer":1,"explanation":"Standard error of the mean falls as 1/√N — diminishing but real returns to numbers.","cat":"Crowd intelligence"},{"prompt":"A prediction market’s price is best read as:","options":["A random number","A probability-like aggregate of participants’ information","One trader’s opinion"],"answer":1,"explanation":"Trading pulls dispersed knowledge into a single price that behaves like a probability.","cat":"Crowd intelligence"}],"next":{"href":"book-2.html","label":"On to Book Two"}}</script>
