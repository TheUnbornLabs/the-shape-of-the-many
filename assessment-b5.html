<script>window.__ASSESS__={"title":"Book Five","questions":[{"prompt":"Ant-inspired algorithms solve routing problems by mimicking:","options":["A queen’s orders","Stigmergic pheromone trails","Random search"],"answer":1,"explanation":"Ant-colony optimisation reuses stigmergy (Book One, Ch 4) for computation.","cat":"Digital swarms"},{"prompt":"A feedback risk is that recommenders can:","options":["Only reflect preferences","Shape the very preferences they claim to predict","Have no effect"],"answer":1,"explanation":"Reflexivity returns: the system alters the behaviour it measures.","cat":"Digital swarms"},{"prompt":"Studies find each moral-emotional word in a post tends to:","options":["Reduce its spread","Increase its spread","Have no effect"],"answer":1,"explanation":"Moral-emotional language raises diffusion, especially within ideological groups.","cat":"Digital swarms"},{"prompt":"Bots amplify a message mainly by inflating apparent:","options":["Accuracy","Popularity and consensus","Length"],"answer":1,"explanation":"Fabricated volume tricks both people and ranking algorithms into treating it as real support.","cat":"Digital swarms"},{"prompt":"These projects show the wise crowd can be:","options":["Only theoretical","Institutionalised to produce durable public goods","Impossible online"],"answer":1,"explanation":"Good design turns dispersed contribution into reliable output.","cat":"Digital swarms"},{"prompt":"Superforecasters excel by:","options":["Bold single predictions","Probabilistic thinking and frequent belief updating","Ignoring evidence"],"answer":1,"explanation":"They treat beliefs as probabilities to be revised, not identities to defend.","cat":"Digital swarms"},{"prompt":"Aggregating many amateur classifications can rival experts because:","options":["Errors are correlated","Independent errors cancel (wisdom of crowds)","Amateurs never err"],"answer":1,"explanation":"The same error-cancellation from Book One applies to distributed labelling.","cat":"Digital swarms"},{"prompt":"A caution with ABMs is that they are:","options":["Always correct","Only as good as their assumptions — suggestive, not proof","Useless"],"answer":1,"explanation":"Models illuminate mechanisms but must be validated against reality — epistemic humility.","cat":"The toolkit & epistemics"},{"prompt":"Axelrod found that successful strategies tended to be:","options":["Nasty and unforgiving","Nice, retaliatory, and forgiving","Purely random"],"answer":1,"explanation":"Never defect first, punish defection, then forgive — the recipe for durable cooperation.","cat":"The toolkit & epistemics"},{"prompt":"A ‘glider’ in Life is a pattern that:","options":["Stays fixed","Moves across the grid — emergent motion from static rules","Vanishes instantly"],"answer":1,"explanation":"Coordinated cell changes produce a travelling structure nobody encoded directly.","cat":"The toolkit & epistemics"},{"prompt":"Assuming a bell curve where a power law rules leads you to:","options":["Overestimate rare extremes","Badly underestimate rare extremes (crashes, pandemics)","Predict perfectly"],"answer":1,"explanation":"Heavy tails make ‘black swan’ events far likelier than normal-distribution intuitions expect.","cat":"The toolkit & epistemics"},{"prompt":"Statistical physics models of flocks (e.g. Vicsek) show collective motion has:","options":["No transitions","Order–disorder phase transitions with density/noise","Only randomness"],"answer":1,"explanation":"Above a critical alignment, the group moves coherently; below it, disorder — a phase transition.","cat":"The toolkit & epistemics"}],"next":{"href":"index.html","label":"Back to the series home"}}</script>
